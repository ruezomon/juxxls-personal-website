<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boykisser Flappy</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => { resize(); initStars(); });

let stars = [];
function initStars() {
  stars = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.2 + 0.3,
    op: Math.random(),
    spd: Math.random() * 0.02 + 0.005,
    dir: Math.random() > 0.5 ? 1 : -1,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
  }));
}
initStars();

function drawStars() {
  stars.forEach(s => {
    s.op += s.spd * s.dir;
    if (s.op >= 1) { s.op = 1; s.dir = -1; }
    if (s.op <= 0) { s.op = 0; s.dir = 1; }
    s.x += s.vx; s.y += s.vy;
    if (s.x < 0) s.x = canvas.width;
    if (s.x > canvas.width) s.x = 0;
    if (s.y < 0) s.y = canvas.height;
    if (s.y > canvas.height) s.y = 0;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.op})`;
    ctx.fill();
  });
}

const birdImg = new Image();
birdImg.src = "../assets/boykisser_sit.gif";

const GRAVITY = 0.08;
const JUMP = -3.5;
const PIPE_W = 36;
const PIPE_SPEED = 1.6;

let state = "idle", bird, pipes, score, best = 0, frame, pipeGap;

function init() {
  pipeGap = Math.max(90, canvas.height * 0.38);
  bird = { x: canvas.width * 0.2, y: canvas.height / 2, vy: 0, size: Math.min(36, canvas.height * 0.1) };
  pipes = [];
  score = 0;
  frame = 0;
  spawnPipe();
}

function spawnPipe() {
  const margin = canvas.height * 0.15;
  const top = margin + Math.random() * (canvas.height - pipeGap - margin * 2);
  pipes.push({ x: canvas.width + PIPE_W, top, scored: false });
}

function jump() {
  if (state === "idle") { state = "playing"; init(); bird.vy = JUMP; }
  else if (state === "playing") { bird.vy = JUMP; }
  else if (state === "dead") { state = "idle"; }
}

document.addEventListener("keydown", e => { if (e.code === "Space") { e.preventDefault(); jump(); } });
canvas.addEventListener("click", jump);
canvas.addEventListener("touchstart", e => { e.preventDefault(); jump(); }, { passive: false });

function rr(x, y, w, h) {
  const r = 4;
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawPipe(x, top) {
  const bottom = top + pipeGap;
  ctx.fillStyle = "#111"; ctx.strokeStyle = "rgba(80,80,80,0.5)"; ctx.lineWidth = 1;
  rr(x, 0, PIPE_W, top - 8); ctx.fill(); ctx.stroke();
  rr(x - 4, top - 18, PIPE_W + 8, 14); ctx.fill(); ctx.stroke();
  rr(x, bottom + 8, PIPE_W, canvas.height - bottom - 8); ctx.fill(); ctx.stroke();
  rr(x - 4, bottom + 4, PIPE_W + 8, 14); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.04)";
  rr(x + 3, 0, 5, top - 8); ctx.fill();
  rr(x + 3, bottom + 8, 5, canvas.height - bottom - 8); ctx.fill();
}

function drawBird() {
  const s = bird.size;
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.min(Math.max(bird.vy * 3.5, -25), 55) * Math.PI / 180);
  if (birdImg.complete && birdImg.naturalWidth > 0) {
    ctx.drawImage(birdImg, -s / 2, -s / 2, s, s);
  } else {
    ctx.beginPath(); ctx.arc(0, 0, s / 2, 0, Math.PI * 2);
    ctx.fillStyle = "#fff"; ctx.fill();
  }
  ctx.restore();
}

function checkCollision() {
  const pad = bird.size * 0.25;
  const bx = bird.x - bird.size / 2 + pad, by = bird.y - bird.size / 2 + pad;
  const bw = bird.size - pad * 2, bh = bird.size - pad * 2;
  if (by <= 0 || by + bh >= canvas.height) return true;
  for (const p of pipes) {
    const inX = bx + bw > p.x + 2 && bx < p.x + PIPE_W - 2;
    if (inX && (by < p.top - 8 || by + bh > p.top + pipeGap + 8)) return true;
  }
  return false;
}

function txt(t, x, y, fs, color, align = "center") {
  ctx.font = `${fs}px 'Russo One', monospace`;
  ctx.fillStyle = color; ctx.textAlign = align;
  ctx.fillText(t, x, y);
}

function drawIdle() {
  ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  const fs = Math.min(18, canvas.width * 0.04);
  txt("BOYKISSER FLAPPY", canvas.width / 2, canvas.height / 2 - fs * 2.5, fs, "#fff");
  txt("click or space to play", canvas.width / 2, canvas.height / 2 - fs * 0.8, fs * 0.6, "rgba(255,255,255,0.5)");
  if (best > 0) txt(`best: ${best}`, canvas.width / 2, canvas.height / 2 + fs * 0.8, fs * 0.55, "rgba(255,255,255,0.3)");
  drawBird();
}

function drawDead() {
  ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  const fs = Math.min(18, canvas.width * 0.04);
  txt("oof", canvas.width / 2, canvas.height / 2 - fs * 2, fs * 1.1, "#fff");
  txt(`score: ${score}`, canvas.width / 2, canvas.height / 2 - fs * 0.5, fs * 0.75, "rgba(255,255,255,0.8)");
  txt(`best: ${best}`, canvas.width / 2, canvas.height / 2 + fs * 0.8, fs * 0.75, "rgba(255,255,255,0.5)");
  txt("click or space to retry", canvas.width / 2, canvas.height / 2 + fs * 2.2, fs * 0.55, "rgba(255,255,255,0.35)");
}

init();

function loop() {
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawStars();

  if (state === "idle") {
    drawIdle();
  } else if (state === "playing") {
    frame++;
    if (frame % Math.max(55, 90 - Math.floor(score / 5) * 3) === 0) spawnPipe();
    bird.vy += GRAVITY; bird.y += bird.vy;
    const speed = PIPE_SPEED + score * 0.03;
    pipes.forEach(p => {
      p.x -= speed;
      if (!p.scored && p.x + PIPE_W < bird.x) { p.scored = true; score++; }
    });
    pipes = pipes.filter(p => p.x + PIPE_W > -10);
    pipes.forEach(p => drawPipe(p.x, p.top));
    drawBird();
    const fs = Math.min(22, canvas.width * 0.04);
    txt(score, canvas.width / 2, fs * 1.6, fs, "rgba(255,255,255,0.9)");
    if (checkCollision()) { state = "dead"; if (score > best) best = score; }
  } else if (state === "dead") {
    pipes.forEach(p => drawPipe(p.x, p.top));
    drawBird();
    drawDead();
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
